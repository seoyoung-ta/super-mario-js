<!DOCTYPE html>
<html lang="ko">
<head>

<title>Super Mario 1-1 & 1-2</title>
<style>

</head>
<body>
<div id="ui">
  <span><b>MARIO</b><span id="score">000000</span></span>
  <span><b>COINS</b><span id="coins">x00</span></span>
  <span><b>WORLD</b><span id="world">1-1</span></span>

<canvas id="c" width="800" height="400"></canvas>

<div id="ctrl">Left/Right Arrow or A/D to move | Space to jump</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=400,T=32,GRAV=0.55,MAXFALL=13,ESPD=1.0;
const RAINBOW=['#E83000','#FF7700','#DDCC00','#00A800','#0055FF','#8800CC','#FF00AA'];

const CLOUDS=[{wx:300,y:50,w:90},{wx:750,y:38,w:110},{wx:1200,y:55,w:80},{wx:1700,y:42,w:95},{wx:2200,y:58,w:85},{wx:2800,y:44,w:100},{wx:3400,y:52,w:75},{wx:4100,y:40,w:95},{wx:4900,y:48,w:88}];
const KEY={left:false,right:false,jump:false};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')KEY.left=true;
  if(e.key==='ArrowRight'||e.key==='d')KEY.right=true;
  if(e.key===' ')KEY.jump=true;
  if(e.key===' '&&gameState==='gameover'){if(currentStage===2){lives=3;timeLeft=400;timeTimer=0;camX=0;cloudOff=0;gameState='play';rainbowIdx=0;rainbowT=0;document.getElementById('msg').textContent='';spawnLevel();}else init();}
  if([' ','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')KEY.left=false;
  if(e.key==='ArrowRight'||e.key==='d')KEY.right=false;
  if(e.key===' ')KEY.jump=false;
});
window.addEventListener('blur',()=>{KEY.left=false;KEY.right=false;KEY.jump=false;});
let score=0,coins=0,lives=3,timeLeft=400,timeTimer=0,camX=0,cloudOff=0,gameState='play',currentStage=1;

function init(){score=0;coins=0;lives=3;timeLeft=400;timeTimer=0;camX=0;cloudOff=0;gameState='play';rainbowIdx=0;rainbowT=0;currentStage=1;document.getElementById('world').textContent='1-1';document.getElementById('msg').textContent='';spawnLevel();}
function respawn(){camX=0;cloudOff=0;rainbowIdx=0;rainbowT=0;timeLeft=400;timeTimer=0;document.getElementById('msg').textContent='';spawnLevel();}
function spawnLevel(){platforms=[];blocks=[];qbs=[];pipes=[];enemies=[];mushrooms=[];particles=[];if(currentStage===1)spawnStage1();else spawnStage2();}
function spawnStage1(){const GY=H-T*2;for(let x=0;x<6400;x+=T){if((x>=2304&&x<2432)||(x>=3200&&x<3328))continue;platforms.push({x,y:GY,w:T,h:T*2});}const mkPipe=(col,rows)=>pipes.push({x:col*T,y:GY-rows*T+T,w:T*2,h:rows*T});mkPipe(28,2);mkPipe(38,3);mkPipe(46,4);mkPipe(57,4);mkPipe(87,2);mkPipe(95,3);const mkQ=(col,row,has)=>qbs.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,used:false,has,bump:0});mkQ(16,6,'coin');mkQ(20,6,'item');mkQ(21,6,'coin');mkQ(22,6,'coin');mkQ(27,4,'item');mkQ(40,6,'coin');mkQ(55,4,'coin');mkQ(57,4,'item');mkQ(78,6,'coin');mkQ(94,6,'item');const mkB=(col,row)=>blocks.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,hit:false,dead:false,bump:0});mkB(17,6);mkB(18,6);mkB(19,6);mkB(39,6);mkB(41,6);mkB(52,6);mkB(53,6);mkB(54,6);mkB(56,6);mkB(77,3);mkB(78,3);mkB(79,3);mkB(80,3);mkB(91,6);mkB(92,6);mkB(96,6);mkB(97,6);mkB(98,6);mkB(107,6);mkB(108,6);mkB(109,6);mkB(110,6);mkB(111,6);const mkE=(col,type)=>enemies.push({x:col*T,y:GY-T,w:T,h:T,type,vx:-ESPD,vy:0,onGround:false,dead:false,deadTimer:0,shell:false,shellMove:false,frame:0,ft:0});mkE(22,'goomba');mkE(35,'goomba');mkE(50,'goomba');mkE(51,'goomba');mkE(70,'koopa');mkE(82,'goomba');mkE(90,'koopa');mkE(100,'goomba');mkE(101,'goomba');for(let s=0;s<8;s++)for(let r=0;r<=s;r++)platforms.push({x:(148+s)*T,y:GY-r*T,w:T,h:T});for(let s=7;s>=0;s--)for(let r=0;r<=s;r++)platforms.push({x:(158+(7-s))*T,y:GY-r*T,w:T,h:T});platforms.push({_flag:true,x:165*T,y:GY-9*T,w:4,h:9*T});mario={x:64,y:GY-T,w:24,h:T,vx:0,vy:0,onGround:false,super:false,dir:1,dead:false,deadTimer:0,inv:0,walkFrame:0,walkTimer:0};}
function spawnStage2(){const GY=H-T*2;const ES=ESPD*3;for(let x=0;x<5*T;x+=T)platforms.push({x,y:GY,w:T,h:T*2});const plat=(col,row,len)=>{for(let i=0;i<len;i++)platforms.push({x:(col+i)*T,y:row*T,w:T,h:T*2});};plat(7,10,3);plat(13,10,2);plat(18,10,3);plat(24,10,2);plat(29,10,4);plat(36,10,2);plat(41,10,3);plat(47,10,2);plat(52,10,3);plat(58,10,2);plat(63,10,4);plat(70,10,2);plat(75,10,3);plat(81,10,2);plat(86,10,3);plat(92,10,2);plat(97,10,4);plat(104,10,2);plat(109,10,3);plat(115,10,2);plat(120,10,3);plat(126,10,2);plat(131,10,4);for(let s=0;s<8;s++)for(let r=0;r<=s;r++)platforms.push({x:(138+s)*T,y:GY-r*T,w:T,h:T});for(let s=7;s>=0;s--)for(let r=0;r<=s;r++)platforms.push({x:(148+(7-s))*T,y:GY-r*T,w:T,h:T});platforms.push({_flag:true,x:157*T,y:GY-9*T,w:4,h:9*T});const mkPipe=(col,rows,platRow,spawner=false)=>{const py=platRow*T-rows*T;pipes.push({x:col*T,y:py,w:T*2,h:rows*T,spawner,spawnTimer:0});};mkPipe(8,2,10,true);mkPipe(19,3,10,true);mkPipe(30,2,10,true);mkPipe(42,3,10,true);mkPipe(53,2,10,true);mkPipe(64,3,10,true);mkPipe(76,2,10,true);mkPipe(87,3,10,true);mkPipe(98,2,10,true);mkPipe(110,3,10,true);mkPipe(121,2,10,true);const mkQ=(col,row,has)=>qbs.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,used:false,has,bump:0});mkQ(10,7,'item');mkQ(20,7,'coin');mkQ(25,6,'item');mkQ(37,7,'coin');mkQ(43,6,'item');mkQ(54,7,'coin');mkQ(65,6,'item');mkQ(77,7,'coin');mkQ(88,6,'item');mkQ(99,7,'coin');mkQ(111,6,'item');mkQ(122,7,'coin');const mkB=(col,row)=>blocks.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,hit:false,dead:false,bump:0});mkB(14,7);mkB(15,7);mkB(26,7);mkB(27,7);mkB(28,7);mkB(38,7);mkB(39,7);mkB(48,7);mkB(49,7);mkB(50,7);mkB(59,7);mkB(60,7);mkB(71,7);mkB(72,7);mkB(73,7);mkB(82,7);mkB(83,7);mkB(93,7);mkB(94,7);mkB(95,7);mkB(105,7);mkB(106,7);mkB(116,7);mkB(117,7);mkB(118,7);mkB(127,7);mkB(128,7);const mkE=(col,row,type)=>enemies.push({x:col*T,y:row*T-T,w:T,h:T,type,vx:-ES,vy:0,onGround:false,dead:false,deadTimer:0,shell:false,shellMove:false,frame:0,ft:0});mkE(8,10,'goomba');mkE(9,10,'goomba');mkE(14,10,'koopa');mkE(15,10,'goomba');mkE(19,10,'goomba');mkE(20,10,'goomba');mkE(25,10,'koopa');mkE(26,10,'koopa');mkE(30,10,'goomba');mkE(31,10,'goomba');mkE(32,10,'goomba');mkE(37,10,'koopa');mkE(38,10,'goomba');mkE(42,10,'goomba');mkE(43,10,'goomba');mkE(44,10,'koopa');mkE(48,10,'goomba');mkE(49,10,'goomba');mkE(53,10,'koopa');mkE(54,10,'koopa');mkE(55,10,'goomba');mkE(59,10,'goomba');mkE(60,10,'goomba');mkE(61,10,'goomba');mkE(64,10,'koopa');mkE(65,10,'koopa');mkE(71,10,'goomba');mkE(72,10,'goomba');mkE(73,10,'koopa');mkE(76,10,'goomba');mkE(77,10,'goomba');mkE(78,10,'goomba');mkE(82,10,'koopa');mkE(83,10,'koopa');mkE(84,10,'goomba');mkE(87,10,'goomba');mkE(88,10,'goomba');mkE(93,10,'koopa');mkE(94,10,'koopa');mkE(95,10,'koopa');mkE(98,10,'goomba');mkE(99,10,'goomba');mkE(100,10,'goomba');mkE(105,10,'goomba');mkE(106,10,'koopa');mkE(107,10,'goomba');mkE(110,10,'koopa');mkE(111,10,'koopa');mkE(116,10,'goomba');mkE(117,10,'goomba');mkE(118,10,'koopa');mkE(119,10,'goomba');mkE(122,10,'koopa');mkE(123,10,'koopa');mkE(124,10,'goomba');mario={x:64,y:GY-T,w:24,h:T,vx:0,vy:0,onGround:false,super:false,dir:1,dead:false,deadTimer:0,inv:0,walkFrame:0,walkTimer:0};}
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function getSolid(){const s=[...platforms.filter(p=>!p._flag),...pipes];for(const b of blocks)if(!b.hit)s.push(b);for(const q of qbs)s.push(q);return s;}
function resolveH(o,sl){for(const s of sl){if(!aabb(o,s))continue;if(o.vx>0)o.x=s.x-o.w;else if(o.vx<0)o.x=s.x+s.w;o.vx=0;}}
function resolveV(o,sl){o.onGround=false;for(const s of sl){if(!aabb(o,s))continue;if(o.vy>=0){o.y=s.y-o.h;o.vy=0;o.onGround=true;}else{o.y=s.y+s.h;o.vy=0.5;}}}
function headHit(o,r){return aabb({x:o.x+2,y:o.y,w:o.w-4,h:4},{x:r.x,y:r.y+r.h-4,w:r.w,h:8});}
function sparks(x,y,col,n=6){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:30,col});}}
function popCoin(x,y){particles.push({x,y,vx:0,vy:-8,life:40,col:C.coin,isCoin:true});}
function mkMush(x,y){mushrooms.push({x,y,w:T,h:T,vx:1.5,vy:-2,onGround:false,done:false});}
function killMario(){if(mario.dead)return;mario.dead=true;mario.deadTimer=150;mario.vy=-13;mario.vx=0;}
function update(){if(gameState!=='play')return;cloudOff+=0.08;timeTimer++;if(timeTimer>=60){timeTimer=0;timeLeft=Math.max(0,timeLeft-1);}if(timeLeft===0&&!mario.dead)killMario();if(mario.super){rainbowT++;if(rainbowT>=6){rainbowT=0;rainbowIdx=(rainbowIdx+1)%RAINBOW.length;}}if(mario.dead){mario.vy+=GRAV;mario.y+=mario.vy;mario.deadTimer--;if(mario.deadTimer<=0){lives--;if(lives<=0){gameState='gameover';document.getElementById('msg').textContent='GAME OVER - Space to restart';updateUI();return;}respawn();}updateUI();return;}if(mario.inv>0)mario.inv--;const spd=3;if(KEY.left&&!KEY.right){mario.vx=-spd;mario.dir=-1;}else if(KEY.right&&!KEY.left){mario.vx=spd;mario.dir=1;}else{mario.vx=0;}if(KEY.jump&&mario.onGround){mario.vy=-13;mario.onGround=false;}if(mario.vx!==0){mario.walkTimer++;if(mario.walkTimer>10){mario.walkTimer=0;mario.walkFrame^=1;}}else{mario.walkFrame=0;mario.walkTimer=0;}mario.vy=Math.min(mario.vy+GRAV,MAXFALL);mario.x+=mario.vx;mario.x=Math.max(0,mario.x);const sol=getSolid();resolveH(mario,sol);mario.y+=mario.vy;resolveV(mario,sol);if(mario.vy<0){for(const q of qbs){if(q.used)continue;if(headHit(mario,q)){q.used=true;q.bump=10;if(q.has==='item'){if(Math.random()<0.5)mkMush(q.x,q.y-T);else{score+=100;coins++;popCoin(q.x+T/2,q.y);}}else{score+=100;coins++;popCoin(q.x+T/2,q.y);}sparks(q.x+T/2,q.y,C.qt,4);}}for(const b of blocks){if(b.hit||b.bump>0)continue;if(headHit(mario,b)){b.bump=12;b.dead=false;}}}for(const b of blocks){if(b.bump>0){b.bump-=1.5;b.y=b.baseY-Math.max(0,Math.sin(b.bump/12*Math.PI)*8);if(b.bump<=0){b.bump=0;b.y=b.baseY;if(!b.hit){if(Math.random()<0.5){b.hit=true;score+=50;sparks(b.x+T/2,b.baseY,C.bt,8);}else b.dead=true;}}}}for(const q of qbs){if(q.bump>0){q.bump=Math.max(0,q.bump-1.5);q.y=q.baseY-Math.max(0,Math.sin(q.bump/10*Math.PI)*7);}else q.y=q.baseY;}if(mario.y>H+80)killMario();const eSol=getSolid();if(currentStage===2){for(const p of pipes){if(!p.spawner)continue;p.spawnTimer=(p.spawnTimer||0)+1;if(p.spawnTimer>=300){p.spawnTimer=0;enemies.push({x:p.x+T/2-T/2,y:p.y-T,w:T,h:T,type:'goomba',vx:0,vy:0,onGround:true,dead:false,deadTimer:0,shell:false,shellMove:false,frame:0,ft:0,pipeTop:true});}}for(const e of enemies){if(e.pipeTop&&!e.dead){e.vx=0;const myPipe=pipes.find(p=>p.spawner&&Math.abs(p.x+T/2-e.x-T/2)<T);if(myPipe)e.x=myPipe.x+T/2-T/2;}}}for(const e of enemies){if(e.dead){if(e.shell&&e.shellMove){e.vy=Math.min(e.vy+GRAV,MAXFALL);e.x+=e.vx;for(const s of eSol){if(!aabb(e,s))continue;if(e.vx>0)e.x=s.x-e.w;else e.x=s.x+e.w;e.vx*=-1;}e.onGround=false;e.y+=e.vy;for(const s of eSol){if(!aabb(e,s))continue;if(e.vy>=0){e.y=s.y-e.h;e.vy=0;e.onGround=true;}else{e.y=s.y+e.h;e.vy=0.5;}}for(const e2 of enemies){if(e2===e||e2.dead)continue;if(aabb(e,e2)){e2.dead=true;e2.deadTimer=30;score+=200;sparks(e2.x+T/2,e2.y,'#A04000',5);}}if(!mario.dead&&!mario.inv&&aabb(mario,e)){if(mario.super){mario.super=false;mario.inv=120;}else killMario();}}if(!e.shellMove){e.deadTimer--;if(e.deadTimer<=0)e.dead=true;}if(e.y>H+50)e.dead=true;continue;}e.ft++;if(e.ft>18){e.ft=0;e.frame^=1;}if(!e.pipeTop){e.vy=Math.min(e.vy+GRAV,MAXFALL);e.x+=e.vx;for(const s of eSol){if(!aabb(e,s))continue;if(e.vx>0)e.x=s.x-e.w;else e.x=s.x+e.w;e.vx*=-1;}e.onGround=false;e.y+=e.vy;for(const s of eSol){if(!aabb(e,s))continue;if(e.vy>=0){e.y=s.y-e.h;e.vy=0;e.onGround=true;}else{e.y=s.y+e.h;e.vy=0.5;}}if(e.y>H+50){e.dead=true;continue;}}if(!mario.dead&&!mario.inv&&aabb(mario,e)){const stomp=mario.vy>0&&(mario.y+mario.h)<(e.y+16);if(stomp){if(e.type==='goomba'){e.dead=true;e.deadTimer=30;score+=200;sparks(e.x+T/2,e.y,'#A04000',5);}else if(e.type==='koopa'){if(!e.shell){e.shell=true;e.dead=true;e.deadTimer=9999;e.vx=0;e.shellMove=false;e.h=Math.round(T*0.7);}else if(!e.shellMove){e.shellMove=true;e.vx=(mario.x+mario.w/2<e.x+e.w/2)?-7:7;score+=400;}}mario.vy=-9;score+=100;}else{if(e.type==='koopa'&&e.shell&&!e.shellMove){e.shellMove=true;e.vx=(mario.x+mario.w/2<e.x+e.w/2)?7:-7;score+=400;mario.inv=10;}else{if(mario.super){mario.super=false;mario.inv=120;}else killMario();}}}}for(const m of mushrooms){if(m.done)continue;m.vy=Math.min(m.vy+GRAV,MAXFALL);m.x+=m.vx;const ms=getSolid();for(const s of ms){if(!aabb(m,s))continue;if(m.vx>0)m.x=s.x-m.w;else m.x=s.x+m.w;m.vx*=-1;}m.onGround=false;m.y+=m.vy;for(const s of ms){if(!aabb(m,s))continue;if(m.vy>=0){m.y=s.y-m.h;m.vy=0;m.onGround=true;}else{m.y=s.y+m.h;m.vy=0;}}if(aabb(mario,m)){m.done=true;mario.super=true;lives=Math.min(9,lives+1);mario.inv=60;score+=1000;sparks(m.x+T/2,m.y,'#E83000',6);}}for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;}const pole=platforms.find(p=>p._flag);if(pole&&!pole._reached&&!mario.dead){const poleX=pole.x+2;if(mario.x+mario.w>=poleX&&mario.x<=poleX+4){pole._reached=true;gameState='clear';score+=2000;if(currentStage===1){document.getElementById('msg').textContent='STAGE 1-1 CLEAR! -> 1-2';setTimeout(()=>{currentStage=2;timeLeft=400;timeTimer=0;camX=0;cloudOff=0;gameState='play';document.getElementById('world').textContent='1-2';document.getElementById('msg').textContent='';spawnLevel();},2500);}else{document.getElementById('msg').textContent='ALL CLEAR!';setTimeout(()=>{score=0;coins=0;lives=3;timeLeft=400;currentStage=1;document.getElementById('world').textContent='1-1';init();},3000);}}}camX=Math.max(0,Math.min(mario.x-W/3,6400-W));updateUI();}
function updateUI(){document.getElementById('score').textContent=String(score).padStart(6,'0');document.getElementById('coins').textContent='x'+String(coins).padStart(2,'0');document.getElementById('time').textContent=timeLeft;document.getElementById('lives').textContent='x'+lives;}
function drawCloud(wx,y,w){let sx=(wx-cloudOff)%6400;if(sx<-300)sx+=6400;const dx=sx-camX;if(dx>W+300||dx<-300)return;cx.fillStyle='rgba(255,255,255,0.93)';cx.fillRect(dx,y,w,18);cx.fillRect(dx+w*.15,y-13,w*.5,17);cx.fillRect(dx+w*.55,y-9,w*.3,13);}
function drawTerrain(p){if(p._flag)return;const x=p.x-camX,y=p.y,w=p.w,h=p.h;cx.fillStyle=C.gt;cx.fillRect(x,y,w,8);cx.fillStyle=C.gb;cx.fillRect(x,y+8,w,h-8);cx.fillStyle=C.gt;for(let i=0;i<w;i+=T)cx.fillRect(x+i,y+8,2,h-8);}
function drawBrick(b){if(b.hit)return;const x=b.x-camX,y=b.y;cx.fillStyle=b.dead?C.bd:C.bt;cx.fillRect(x,y,T,T);cx.fillStyle=b.dead?C.bdl:C.bl;cx.fillRect(x,y,T,2);cx.fillRect(x,y,2,T);cx.fillRect(x+T/2,y+T/2,2,T/2);cx.fillRect(x,y+T/2,T/2,2);cx.fillRect(x+T-2,y,2,T);cx.fillRect(x,y+T-2,T,2);}
function drawQ(q){const x=q.x-camX,y=q.y;if(q.used){cx.fillStyle='#999';cx.fillRect(x,y,T,T);return;}cx.fillStyle=C.qt;cx.fillRect(x,y,T,T);cx.fillStyle=C.ql;cx.fillRect(x,y,T,2);cx.fillRect(x,y,2,T);cx.fillRect(x+T-2,y,2,T);cx.fillRect(x,y+T-2,T,2);cx.fillStyle='#fff';cx.font='bold 18px monospace';cx.fillText('?',x+9,y+22);}
function drawPipe(p){const x=p.x-camX,y=p.y,w=p.w,h=p.h;cx.fillStyle=C.pg;cx.fillRect(x+2,y+12,w-4,h-12);cx.fillStyle=C.pd;cx.fillRect(x+2,y+12,5,h-12);cx.fillRect(x+w-7,y+12,5,h-12);cx.fillStyle=C.pg;cx.fillRect(x,y,w,13);cx.fillStyle=C.pd;cx.fillRect(x,y,5,13);cx.fillRect(x+w-5,y,5,13);}
function drawFlag(){const p=platforms.find(f=>f._flag);if(!p)return;const px=p.x-camX;cx.fillStyle=C.pole;cx.fillRect(px+T/2-2,p.y,4,p.h);cx.fillStyle=C.fl;cx.fillRect(px+T/2+2,p.y,20,14);cx.fillStyle='#fff';cx.fillRect(px+T/2+4,p.y+2,8,4);cx.fillStyle=C.pole;cx.fillRect(px+T/2-8,p.y+p.h-6,18,6);}
function drawParticle(p){if(p.isCoin){cx.fillStyle=C.coin;cx.fillRect(p.x-camX-4,p.y-8,8,14);return;}const sz=Math.max(2,7*(p.life/35));cx.fillStyle=p.col;cx.fillRect(p.x-camX-sz/2,p.y-sz/2,sz,sz);}
const S=2;
function sp(bx,by,ox,oy,w,h,col){cx.fillStyle=col;cx.fillRect(bx+ox*S,by+oy*S,w*S,h*S);}
function drawMario(){const m=mario;if(m.inv>0&&Math.floor(m.inv/4)%2===1)cx.globalAlpha=0;const hat=m.super?RAINBOW[rainbowIdx]:'#E83000';const suit=m.super?RAINBOW[rainbowIdx]:'#E83000';const pants=m.super?'#333':'#4040BB';cx.save();if(m.dir<0){cx.translate(m.x-camX+T,m.y);cx.scale(-1,1);}else{cx.translate(m.x-camX,m.y);}const q=(ox,oy,w,h,col)=>sp(0,0,ox,oy,w,h,col);if(m.dead){q(4,0,5,1,hat);q(2,1,9,1,hat);q(3,2,8,1,'#6B2700');q(2,3,10,2,'#FCBCB0');q(7,3,2,1,'#000');q(4,4,4,1,'#6B2700');q(3,5,8,2,suit);q(2,7,8,2,pants);q(2,9,3,1,'#5C2A00');q(8,9,3,1,'#5C2A00');cx.globalAlpha=1;cx.restore();return;}q(4,0,5,1,hat);q(2,1,9,1,hat);q(3,2,8,1,'#6B2700');q(1,4,2,2,'#FCBCB0');q(11,4,2,2,'#FCBCB0');q(1,4,1,1,'#E8A080');q(12,4,1,1,'#E8A080');q(2,3,10,3,'#FCBCB0');q(9,3,1,1,'#000');q(10,4,1,1,'#FCBCB0');q(6,5,5,1,'#6B2700');q(5,6,4,1,'#FCBCB0');q(2,6,3,1,pants);q(9,6,3,1,pants);q(2,7,10,3,suit);q(3,7,2,3,pants);q(9,7,2,3,pants);q(2,10,10,1,pants);q(5,8,1,1,'#FFD700');q(8,8,1,1,'#FFD700');if(m.walkFrame===0){q(0,9,2,2,'#FCBCB0');q(12,9,2,2,'#FCBCB0');q(3,11,3,2,pants);q(8,11,3,2,pants);q(2,12,4,2,'#5C2A00');q(8,12,4,2,'#5C2A00');q(1,13,5,1,'#5C2A00');q(8,13,5,1,'#5C2A00');}else{q(0,8,2,2,'#FCBCB0');q(12,10,2,2,'#FCBCB0');q(2,11,3,3,pants);q(9,11,3,2,pants);q(1,13,5,1,'#5C2A00');q(9,12,4,2,'#5C2A00');q(8,13,4,1,'#5C2A00');}cx.globalAlpha=1;cx.restore();}
function drawGoomba(e){const X=e.x-camX,Y=e.y;if(e.dead&&!e.shellMove){cx.save();cx.translate(X,Y+T-2*S);cx.scale(1,(2*S)/(14*S));const q=(ox,oy,w,h,col)=>sp(0,0,ox,oy,w,h,col);q(3,0,8,1,'#8B2500');q(1,1,12,1,'#8B2500');q(0,2,14,2,'#8B2500');q(0,4,14,2,'#8B2500');q(0,3,1,3,'#8B2500');q(13,3,1,3,'#8B2500');q(1,6,12,3,'#8B2500');q(3,6,3,2,'#fff');q(8,6,3,2,'#fff');q(5,6,2,2,'#000');q(8,6,2,2,'#000');q(5,6,1,1,'#fff');q(9,6,1,1,'#fff');q(4,9,6,5,'#FCBCB0');cx.restore();return;}const q=(ox,oy,w,h,col)=>sp(X,Y,ox,oy,w,h,col);q(3,0,8,1,'#8B2500');q(1,1,12,1,'#8B2500');q(0,2,14,2,'#8B2500');q(0,4,14,2,'#8B2500');q(0,3,1,3,'#8B2500');q(13,3,1,3,'#8B2500');q(1,6,12,3,'#8B2500');q(1,4,2,1,'#000');q(3,5,3,1,'#000');q(8,5,3,1,'#000');q(11,4,2,1,'#000');q(3,6,3,2,'#fff');q(8,6,3,2,'#fff');q(5,6,2,2,'#000');q(8,6,2,2,'#000');q(5,6,1,1,'#fff');q(9,6,1,1,'#fff');q(4,9,6,5,'#FCBCB0');if(e.frame===0){q(2,12,4,2,'#5C2A00');q(8,11,4,2,'#5C2A00');q(1,13,5,1,'#5C2A00');q(7,12,6,1,'#5C2A00');}else{q(2,11,4,2,'#5C2A00');q(8,12,4,2,'#5C2A00');q(1,12,6,1,'#5C2A00');q(8,13,5,1,'#5C2A00');}}
function drawShellSprite(bx,by,sh){cx.fillStyle='#B89600';cx.fillRect(bx+2*S,by,10*S,sh);cx.fillStyle='#E8C800';cx.fillRect(bx+3*S,by+S,8*S,sh-2*S);cx.fillStyle='#3CB200';[[4,2],[8,2],[4,7],[8,7]].forEach(([ox,oy])=>cx.fillRect(bx+ox*S,by+oy*S,3*S,4*S));cx.fillRect(bx+6*S,by+4*S,2*S,5*S);cx.fillStyle='#8B6C00';cx.fillRect(bx+3*S,by+2*S,9*S,S);cx.fillRect(bx+3*S,by+13*S,9*S,S);cx.fillRect(bx+2*S,by+S,S,13*S);cx.fillRect(bx+12*S,by+S,S,13*S);}
function drawKoopa(e){const X=e.x-camX,Y=e.y;if(e.shell){cx.save();if(e.shellMove){cx.translate(X+T/2,Y+e.h/2);cx.rotate((Date.now()/60)*(e.vx>0?1:-1));cx.translate(-T/2,-e.h/2);drawShellSprite(0,0,e.h);}else drawShellSprite(X,Y,e.h);cx.restore();return;}cx.save();if(e.vx>0){cx.translate(X+T,Y);cx.scale(-1,1);}else{cx.translate(X,Y);}const q=(ox,oy,w,h,col)=>sp(0,0,ox,oy,w,h,col);q(5,2,9,10,'#2A8000');q(6,3,7,8,'#3CB200');q(9,3,1,8,'#2A8000');q(6,6,7,2,'#2A8000');q(5,2,9,1,'#E8C800');q(5,11,9,1,'#E8C800');q(5,2,1,10,'#E8C800');q(13,2,1,10,'#E8C800');q(1,1,5,4,'#FCBCB0');q(1,0,4,1,'#FCBCB0');q(3,1,2,2,'#000');q(3,1,1,1,'#fff');q(2,4,3,1,'#cc8800');if(!e.frame){q(6,13,3,2,'#FCBCB0');q(10,13,3,2,'#FCBCB0');q(5,14,4,1,'#2A8000');q(10,14,4,1,'#2A8000');}else{q(5,13,3,2,'#FCBCB0');q(11,13,3,2,'#FCBCB0');q(4,14,4,1,'#2A8000');q(11,14,4,1,'#2A8000');}cx.restore();}
function drawMush(m){if(m.done)return;const X=m.x-camX,Y=m.y;const q=(ox,oy,w,h,col)=>sp(X,Y,ox,oy,w,h,col);q(4,0,6,1,'#CC0000');q(2,1,10,2,'#CC0000');q(1,3,12,3,'#CC0000');q(2,6,10,1,'#CC0000');q(2,2,2,2,'#fff');q(10,2,2,2,'#fff');q(6,4,2,2,'#fff');q(3,7,8,1,'#fff');q(4,8,6,3,'#fff');q(3,8,1,3,'#fff');q(10,8,1,3,'#fff');q(5,7,1,2,'#000');q(8,7,1,2,'#000');}
function draw(){cx.fillStyle=C.sky;cx.fillRect(0,0,W,H);for(const cl of CLOUDS)drawCloud(cl.wx,cl.y,cl.w);for(const p of platforms)drawTerrain(p);for(const p of pipes)drawPipe(p);for(const b of blocks)drawBrick(b);for(const q of qbs)drawQ(q);for(const m of mushrooms)drawMush(m);drawFlag();for(const e of enemies){e.type==='goomba'?drawGoomba(e):drawKoopa(e);}for(const p of particles)if(p.life>0)drawParticle(p);drawMario();if(gameState==='gameover'){cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);cx.fillStyle='#fff';cx.textAlign='center';cx.font='bold 36px monospace';cx.fillText('GAME OVER',W/2,H/2-10);cx.font='16px monospace';cx.fillText('Space to Restart',W/2,H/2+30);cx.textAlign='left';}}
function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>
