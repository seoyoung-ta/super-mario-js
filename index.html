<body>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=400,T=32,GRAV=0.55,MAXFALL=13,ESPD=1.0;
const RAINBOW=['#E83000','#FF7700','#DDCC00','#00A800','#0055FF','#8800CC','#FF00AA'];
const C={sky:'#5C94FC',gt:'#E86010',gb:'#C84C0C',bt:'#C84C0C',bl:'#8B2500',bd:'#5A1500',bdl:'#2E0800',qt:'#E8A000',ql:'#C07000',pg:'#00A800',pd:'#006600',ms:'#FCBCB0',mu:'#E83000',mud:'#FCFCFC',go:'#A04000',god:'#704000',kp:'#00A800',kpd:'#006600',kps:'#FCBCB0',sh:'#FCFC00',fl:'#008000',pole:'#888',coin:'#FCBC00'};
const CLOUDS=[{wx:300,y:50,w:90},{wx:750,y:38,w:110},{wx:1200,y:55,w:80},{wx:1700,y:42,w:95},{wx:2200,y:58,w:85},{wx:2800,y:44,w:100},{wx:3400,y:52,w:75},{wx:4100,y:40,w:95},{wx:4900,y:48,w:88}];
let score=0,coins=0,lives=3,timeLeft=400,timeTimer=0,camX=0,cloudOff=0,gameState='play',keys={},mario,blocks,qbs,pipes,enemies,mushrooms,particles,platforms,pipeAnim=null,rainbowIdx=0,rainbowT=0;
function init(){score=0;lives=3;timeLeft=400;timeTimer=0;camX=0;cloudOff=0;gameState='play';pipeAnim=null;rainbowIdx=0;rainbowT=0;document.getElementById('msg').textContent='';spawnLevel();}
function respawn(){camX=0;cloudOff=0;pipeAnim=null;rainbowIdx=0;rainbowT=0;timeLeft=400;timeTimer=0;document.getElementById('msg').textContent='';spawnLevel();}
function spawnLevel(){platforms=[];blocks=[];qbs=[];pipes=[];enemies=[];mushrooms=[];particles=[];const GY=H-T*2;for(let x=0;x<6400;x+=T){if((x>=2300&&x<2432)||(x>=3200&&x<3360))continue;platforms.push({x,y:GY,w:T,h:T*2});}function mkPipe(col,rows,tun){pipes.push({x:col*T,y:GY-rows*T+T,w:T*2,h:rows*T,tunnel:!!tun});}mkPipe(28,2,true);mkPipe(38,3,true);mkPipe(46,4,false);mkPipe(57,4,false);mkPipe(87,2,true);mkPipe(95,3,false);function mkQ(col,row,has){qbs.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,used:false,has,bump:0});}mkQ(16,6,'coin');mkQ(20,6,'item');mkQ(21,6,'coin');mkQ(22,6,'coin');mkQ(27,4,'item');mkQ(40,6,'coin');mkQ(55,4,'coin');mkQ(57,4,'item');mkQ(78,6,'coin');mkQ(94,6,'item');function mkB(col,row){blocks.push({x:col*T,y:row*T,baseY:row*T,w:T,h:T,hit:false,dead:false,bump:0});}mkB(17,6);mkB(18,6);mkB(19,6);mkB(39,6);mkB(41,6);mkB(52,6);mkB(53,6);mkB(54,6);mkB(56,6);mkB(77,3);mkB(78,3);mkB(79,3);mkB(80,3);mkB(91,6);mkB(92,6);mkB(96,6);mkB(97,6);mkB(98,6);mkB(107,6);mkB(108,6);mkB(109,6);mkB(110,6);mkB(111,6);function mkE(col,type){enemies.push({x:col*T,y:GY-T,w:T,h:T,type,vx:-ESPD,vy:0,onGround:false,dead:false,deadTimer:0,shell:false,shellMove:false,frame:0,ft:0});}mkE(22,'goomba');mkE(35,'goomba');mkE(50,'goomba');mkE(51,'goomba');mkE(70,'koopa');mkE(82,'goomba');mkE(90,'koopa');mkE(100,'goomba');mkE(101,'goomba');for(let s=0;s<8;s++)for(let r=0;r<=s;r++)platforms.push({x:(148+s)*T,y:GY-r*T,w:T,h:T});for(let s=7;s>=0;s--)for(let r=0;r<=s;r++)platforms.push({x:(158+(7-s))*T,y:GY-r*T,w:T,h:T});platforms.push({_flag:true,x:165*T,y:GY-9*T,w:T,h:9*T});mario={x:64,y:GY-T,w:24,h:T,vx:0,vy:0,onGround:false,super:false,dir:1,dead:false,deadTimer:0,inv:0};}
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function getSolid(){const s=[...platforms,...pipes];for(const b of blocks)if(!b.hit)s.push(b);for(const q of qbs)s.push(q);return s;}
function resolveH(o,sl){for(const s of sl){if(!aabb(o,s))continue;if(o.vx>0)o.x=s.x-o.w;else if(o.vx<0)o.x=s.x+s.w;o.vx=0;}}
function resolveV(o,sl){o.onGround=false;for(const s of sl){if(!aabb(o,s))continue;if(o.vy>=0){o.y=s.y-o.h;o.vy=0;o.onGround=true;}else{o.y=s.y+s.h;o.vy=0.5;}}}
function headHit(o,r){return aabb({x:o.x+2,y:o.y,w:o.w-4,h:4},{x:r.x,y:r.y+r.h-4,w:r.w,h:8});}
function sparks(x,y,col,n=6){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:30,col});}}
function popCoin(x,y){particles.push({x,y,vx:0,vy:-8,life:40,col:C.coin,isCoin:true});}
function mkMush(x,y){mushrooms.push({x,y,w:T,h:T,vx:1.5,vy:-2,onGround:false,done:false});}
function killMario(){if(mario.dead||pipeAnim)return;mario.dead=true;mario.deadTimer=150;mario.vy=-13;mario.vx=0;pipeAnim=null;}
function tryPipe(){if(pipeAnim||!mario.onGround)return;const mc=mario.x+mario.w/2;for(const p of pipes){if(!p.tunnel)continue;if(mc>p.x&&mc<p.x+p.w&&Math.abs((mario.y+mario.h)-p.y)<12){pipeAnim={phase:'down',timer:50,pipe:p};mario.vx=0;mario.vy=0;mario.x=p.x+(p.w-mario.w)/2;return;}}}
function updatePipe(){const pa=pipeAnim;if(pa.phase==='down'){mario.y+=2;pa.timer--;if(pa.timer<=0)pa.phase='inside';}else if(pa.phase==='inside'){if(keys['ArrowUp']||keys['w']){pa.phase='up';pa.timer=40;mario.x=pa.pipe.x+(pa.pipe.w-mario.w)/2;mario.y=pa.pipe.y+pa.pipe.h;}}else if(pa.phase==='up'){mario.y-=2;pa.timer--;if(pa.timer<=0){mario.y=pa.pipe.y-mario.h;mario.vy=0;mario.vx=0;mario.onGround=true;pipeAnim=null;}}}
function update(){if(gameState!=='play')return;cloudOff+=0.08;timeTimer++;if(timeTimer>=60){timeTimer=0;timeLeft=Math.max(0,timeLeft-1);}if(timeLeft===0&&!mario.dead)killMario();if(mario.super){rainbowT++;if(rainbowT>=6){rainbowT=0;rainbowIdx=(rainbowIdx+1)%RAINBOW.length;}}if(mario.dead){mario.vy+=GRAV;mario.y+=mario.vy;mario.deadTimer--;if(mario.deadTimer<=0){lives--;if(lives<=0){gameState='gameover';document.getElementById('msg').textContent='GAME OVER';updateUI();return;}respawn();}updateUI();return;}if(pipeAnim){updatePipe();updateUI();return;}if(mario.inv>0)mario.inv--;const spd=keys['x']?4.5:3;if(keys['ArrowLeft']||keys['a']){mario.vx=Math.max(mario.vx-0.4,-spd);mario.dir=-1;}else if(keys['ArrowRight']||keys['d']){mario.vx=Math.min(mario.vx+0.4,spd);mario.dir=1;}else mario.vx*=0.78;if((keys[' ']||keys['z'])&&mario.onGround){mario.vy=-13;mario.onGround=false;}if(keys['ArrowDown'])tryPipe();mario.vy=Math.min(mario.vy+GRAV,MAXFALL);mario.x+=mario.vx;mario.x=Math.max(0,mario.x);const sol=getSolid();resolveH(mario,sol);mario.y+=mario.vy;resolveV(mario,sol);if(mario.vy<0){for(const q of qbs){if(q.used)continue;if(headHit(mario,q)){q.used=true;q.bump=10;if(q.has==='item'){if(Math.random()<0.5)mkMush(q.x,q.y-T);else{score+=100;coins++;popCoin(q.x+T/2,q.y);}}else{score+=100;coins++;popCoin(q.x+T/2,q.y);}sparks(q.x+T/2,q.y,C.qt,4);}}for(const b of blocks){if(b.hit||b.bump>0)continue;if(headHit(mario,b)){b.bump=12;b.dead=false;}}}for(const b of blocks){if(b.bump>0){b.bump-=1.5;b.y=b.baseY-Math.max(0,Math.sin(b.bump/12*Math.PI)*8);if(b.bump<=0){b.bump=0;b.y=b.baseY;if(!b.hit){if(Math.random()<0.5){b.hit=true;score+=50;sparks(b.x+T/2,b.baseY,C.bt,8);}else b.dead=true;}}}}for(const q of qbs){if(q.bump>0){q.bump=Math.max(0,q.bump-1.5);q.y=q.baseY-Math.max(0,Math.sin(q.bump/10*Math.PI)*7);}else q.y=q.baseY;}if(mario.y>H+80)killMario();const eSol=getSolid();for(const e of enemies){if(e.dead){if(e.shell&&e.shellMove){e.vy=Math.min(e.vy+GRAV,MAXFALL);e.x+=e.vx;for(const s of eSol){if(!aabb(e,s))continue;if(e.vx>0)e.x=s.x-e.w;else e.x=s.x+e.w;e.vx*=-1;}e.onGround=false;e.y+=e.vy;for(const s of eSol){if(!aabb(e,s))continue;if(e.vy>=0){e.y=s.y-e.h;e.vy=0;e.onGround=true;}else{e.y=s.y+e.h;e.vy=0.5;}}for(const e2 of enemies){if(e2===e||e2.dead)continue;if(aabb(e,e2)){e2.dead=true;e2.deadTimer=30;score+=200;sparks(e2.x+T/2,e2.y,C.go,5);}}if(!mario.dead&&!mario.inv&&aabb(mario,e)){if(mario.super){mario.super=false;mario.inv=120;}else killMario();}}if(!e.shellMove){e.deadTimer--;if(e.deadTimer<=0)e.dead=true;}if(e.y>H+50)e.dead=true;continue;}e.ft++;if(e.ft>18){e.ft=0;e.frame^=1;}e.vy=Math.min(e.vy+GRAV,MAXFALL);e.x+=e.vx;for(const s of eSol){if(!aabb(e,s))continue;if(e.vx>0)e.x=s.x-e.w;else e.x=s.x+e.w;e.vx*=-1;}e.onGround=false;e.y+=e.vy;for(const s of eSol){if(!aabb(e,s))continue;if(e.vy>=0){e.y=s.y-e.h;e.vy=0;e.onGround=true;}else{e.y=s.y+e.h;e.vy=0.5;}}if(e.y>H+50){e.dead=true;continue;}if(!mario.dead&&!mario.inv&&aabb(mario,e)){const stomp=mario.vy>0&&(mario.y+mario.h)<(e.y+16);if(stomp){if(e.type==='goomba'){e.dead=true;e.deadTimer=30;score+=200;sparks(e.x+T/2,e.y,C.go,5);}else if(e.type==='koopa'){if(!e.shell){e.shell=true;e.dead=true;e.deadTimer=9999;e.vx=0;e.shellMove=false;e.h=Math.round(T*0.7);}else if(!e.shellMove){e.shellMove=true;e.vx=(mario.x+mario.w/2<e.x+e.w/2)?-7:7;score+=400;}}mario.vy=-9;score+=100;}else{if(e.type==='koopa'&&e.shell&&!e.shellMove){e.shellMove=true;e.vx=(mario.x+mario.w/2<e.x+e.w/2)?7:-7;score+=400;mario.inv=10;}else{if(mario.super){mario.super=false;mario.inv=120;}else killMario();}}}}for(const m of mushrooms){if(m.done)continue;m.vy=Math.min(m.vy+GRAV,MAXFALL);m.x+=m.vx;const ms=getSolid();for(const s of ms){if(!aabb(m,s))continue;if(m.vx>0)m.x=s.x-m.w;else m.x=s.x+m.w;m.vx*=-1;}m.onGround=false;m.y+=m.vy;for(const s of ms){if(!aabb(m,s))continue;if(m.vy>=0){m.y=s.y-m.h;m.vy=0;m.onGround=true;}else{m.y=s.y+m.h;m.vy=0;}}if(aabb(mario,m)){m.done=true;mario.super=true;lives=Math.min(9,lives+1);mario.inv=60;score+=1000;sparks(m.x+T/2,m.y,C.mu,6);}}for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;}const pole=platforms.find(p=>p._flag);if(pole&&!pole._reached&&mario.x+mario.w>=pole.x&&mario.x<pole.x+pole.w){pole._reached=true;gameState='clear';score+=2000;document.getElementById('msg').textContent='STAGE CLEAR!';setTimeout(()=>{score=0;coins=0;lives=3;timeLeft=400;init();},3000);}camX=Math.max(0,Math.min(mario.x-W/3,6400-W));updateUI();}
function updateUI(){document.getElementById('score').textContent=String(score).padStart(6,'0');document.getElementById('coins').textContent='x'+String(coins).padStart(2,'0');document.getElementById('time').textContent=timeLeft;document.getElementById('lives').textContent='x'+lives;}
function drawCloud(wx,y,w){let sx=(wx-cloudOff)%6400;if(sx<-300)sx+=6400;const dx=sx-camX;if(dx>W+300||dx<-300)return;cx.fillStyle='rgba(255,255,255,0.93)';cx.fillRect(dx,y,w,18);cx.fillRect(dx+w*.15,y-13,w*.5,17);cx.fillRect(dx+w*.55,y-9,w*.3,13);}
function drawTerrain(p){if(p._flag)return;const x=p.x-camX,y=p.y,w=p.w,h=p.h;cx.fillStyle=C.gt;cx.fillRect(x,y,w,8);cx.fillStyle=C.gb;cx.fillRect(x,y+8,w,h-8);cx.fillStyle=C.gt;for(let i=0;i<w;i+=T)cx.fillRect(x+i,y+8,2,h-8);}
function drawBrick(b){if(b.hit)return;const x=b.x-camX,y=b.y;cx.fillStyle=b.dead?C.bd:C.bt;cx.fillRect(x,y,T,T);cx.fillStyle=b.dead?C.bdl:C.bl;cx.fillRect(x,y,T,2);cx.fillRect(x,y,2,T);cx.fillRect(x+T/2,y+T/2,2,T/2);cx.fillRect(x,y+T/2,T/2,2);cx.fillRect(x+T-2,y,2,T);cx.fillRect(x,y+T-2,T,2);}
function drawQ(q){const x=q.x-camX,y=q.y;if(q.used){cx.fillStyle='#999';cx.fillRect(x,y,T,T);return;}cx.fillStyle=C.qt;cx.fillRect(x,y,T,T);cx.fillStyle=C.ql;cx.fillRect(x,y,T,2);cx.fillRect(x,y,2,T);cx.fillRect(x+T-2,y,2,T);cx.fillRect(x,y+T-2,T,2);cx.fillStyle='#fff';cx.font='bold 18px monospace';cx.fillText('?',x+9,y+22);}
function drawPipe(p){const x=p.x-camX,y=p.y,w=p.w,h=p.h;cx.fillStyle=C.pg;cx.fillRect(x+2,y+12,w-4,h-12);cx.fillStyle=C.pd;cx.fillRect(x+2,y+12,5,h-12);cx.fillRect(x+w-7,y+12,5,h-12);cx.fillStyle=C.pg;cx.fillRect(x,y,w,13);cx.fillStyle=C.pd;cx.fillRect(x,y,5,13);cx.fillRect(x+w-5,y,5,13);if(p.tunnel){cx.strokeStyle='rgba(255,255,180,0.3)';cx.lineWidth=1;cx.strokeRect(x,y,w,h);}}
function drawMush(m){if(m.done)return;const x=m.x-camX,y=m.y;cx.fillStyle=C.mu;cx.fillRect(x,y,T,T/2+4);cx.fillStyle=C.mud;cx.fillRect(x+6,y+4,6,6);cx.fillRect(x+T-12,y+4,6,6);cx.fillStyle=C.ms;cx.fillRect(x+4,y+T/2,T-8,T/2);}
function drawFlag(){const p=platforms.find(f=>f._flag);if(!p)return;const px=p.x-camX;cx.fillStyle=C.pole;cx.fillRect(px+T/2-2,p.y,4,p.h);cx.fillStyle=C.fl;cx.fillRect(px+T/2+2,p.y,20,14);cx.fillStyle='#fff';cx.fillRect(px+T/2+4,p.y+2,8,4);cx.fillStyle=C.pole;cx.fillRect(px+T/2-8,p.y+p.h-6,18,6);}
function drawGoomba(e){const x=e.x-camX,y=e.y;if(e.dead&&!e.shellMove){cx.fillStyle=C.go;cx.fillRect(x,y+T-8,T,8);return;}cx.fillStyle=C.go;cx.fillRect(x+2,y+10,T-4,T-10);cx.fillStyle=C.god;cx.fillRect(x,y,T,14);cx.fillStyle='#fff';cx.fillRect(x+4,y+2,8,8);cx.fillRect(x+T-12,y+2,8,8);cx.fillStyle='#000';const f=e.frame;cx.fillRect(x+(f?6:5),y+(f?6:4),4,4);cx.fillRect(x+T-(f?10:9),y+(f?6:4),4,4);cx.fillStyle=C.god;cx.fillRect(x+(f?0:4),y+T-8,10,8);cx.fillRect(x+T-(f?10:14),y+T-8,10,8);}
function drawKoopa(e){const x=e.x-camX,y=e.y;if(e.shell){cx.save();if(e.shellMove){cx.translate(x+T/2,y+e.h/2);cx.rotate((Date.now()/80)*(e.vx>0?1:-1));cx.translate(-T/2,-e.h/2);cx.fillStyle=C.sh;cx.fillRect(0,0,T-4,e.h);cx.fillStyle=C.kp;cx.fillRect(2,4,T-8,e.h-8);cx.strokeStyle=C.kpd;cx.lineWidth=1;cx.strokeRect(0,0,T-4,e.h);}else{cx.fillStyle=C.sh;cx.fillRect(x+2,y,T-4,e.h);cx.fillStyle=C.kp;cx.fillRect(x+4,y+4,T-8,e.h-8);cx.strokeStyle=C.kpd;cx.lineWidth=1;cx.strokeRect(x+2,y,T-4,e.h);}cx.restore();return;}cx.fillStyle=C.kp;cx.fillRect(x+4,y,T-8,T);cx.fillStyle=C.kps;cx.fillRect(x+6,y-8,T-12,12);cx.fillStyle='#000';cx.fillRect(x+8,y-6,4,4);cx.fillStyle=C.kpd;cx.fillRect(x+(e.frame?2:0),y+T-8,8,8);cx.fillRect(x+T-(e.frame?10:8),y+T-8,8,8);}
function drawMario(){const m=mario;if(m.dead){const x=m.x-camX,y=m.y;cx.fillStyle='#E83000';cx.fillRect(x+2,y,20,10);cx.fillRect(x,y+8,24,6);cx.fillStyle=C.ms;cx.fillRect(x+4,y+14,16,10);cx.fillStyle='#000';cx.fillRect(x+10,y+16,4,4);cx.fillRect(x+16,y+16,4,4);cx.fillStyle='#E83000';cx.fillRect(x,y+24,24,8);cx.fillStyle='#4040c0';cx.fillRect(x,y+30,24,T-30);return;}if(pipeAnim)cx.globalAlpha=0.65;if(m.inv>0&&Math.floor(m.inv/4)%2===1)cx.globalAlpha=0;const x=m.x-camX,y=m.y,w=m.w;const col=m.super?RAINBOW[rainbowIdx]:'#E83000';cx.fillStyle=col;cx.fillRect(x+4,y,14,6);cx.fillRect(x,y+4,w,6);cx.fillStyle=C.ms;cx.fillRect(x+2,y+10,w-4,8);cx.fillStyle='#000';if(m.dir>=0){cx.fillRect(x+8,y+12,3,3);cx.fillRect(x+14,y+12,3,3);}else{cx.fillRect(x+4,y+12,3,3);cx.fillRect(x+10,y+12,3,3);}cx.fillStyle='#8B4000';cx.fillRect(x+3,y+17,w-6,2);cx.fillStyle=col;cx.fillRect(x,y+18,w,10);cx.fillStyle=m.super?'#222':'#4040c0';cx.fillRect(x,y+26,w,T-26);cx.globalAlpha=1;}
function drawParticle(p){if(p.isCoin){cx.fillStyle=C.coin;cx.fillRect(p.x-camX-4,p.y-8,8,14);return;}const sz=Math.max(2,7*(p.life/35));cx.fillStyle=p.col;cx.fillRect(p.x-camX-sz/2,p.y-sz/2,sz,sz);}
function drawPipeHint(){if(!pipeAnim||pipeAnim.phase!=='inside')return;cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(W/2-130,H/2-22,260,44);cx.fillStyle='#fff';cx.font='14px monospace';cx.textAlign='center';cx.fillText('Press Up to Exit Pipe',W/2,H/2+6);cx.textAlign='left';}
function draw(){cx.fillStyle=C.sky;cx.fillRect(0,0,W,H);for(const cl of CLOUDS)drawCloud(cl.wx,cl.y,cl.w);for(const p of platforms)drawTerrain(p);for(const p of pipes)drawPipe(p);for(const b of blocks)drawBrick(b);for(const q of qbs)drawQ(q);for(const m of mushrooms)drawMush(m);drawFlag();for(const e of enemies){e.type==='goomba'?drawGoomba(e):drawKoopa(e);}for(const p of particles)if(p.life>0)drawParticle(p);drawMario();drawPipeHint();if(gameState==='gameover'){cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);cx.fillStyle='#fff';cx.textAlign='center';cx.font='bold 40px monospace';cx.fillText('GAME OVER',W/2,H/2-10);cx.font='16px monospace';cx.fillText('Press Space to Restart',W/2,H/2+30);cx.textAlign='left';}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&gameState==='gameover')init();if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);
init();loop();
</script>
</body>
</html>
